        - generic [ref=f7e486]: 📝
        - heading "Text is truth" [level=3] [ref=f7e487]
        - paragraph [ref=f7e488]: A compact, one-row-one-line markdown table. No opaque blob — ever. It diffs, greps, and syncs like any text file.
      - generic [ref=f7e489]:
        - generic [ref=f7e490]: 👥
        - heading "Collaboration for free" [level=3] [ref=f7e491]
        - paragraph [ref=f7e492]: Bind the canonical text to a text CRDT (Yjs Y.Text). Bring your own provider; Defter never owns the socket.
      - generic [ref=f7e493]:
        - generic [ref=f7e494]: 🤖
        - heading "Agents read & write it" [level=3] [ref=f7e495]
        - paragraph [ref=f7e496]: An LLM authors a markdown table and edits via structured ops. The projection gives search and RAG clean, values-materialized text.
      - generic [ref=f7e497]:
        - generic [ref=f7e498]: 🎨
        - heading "Rich, but still text" [level=3] [ref=f7e499]
        - paragraph [ref=f7e500]: Fills, formats, merges, borders, alignment — a co-canonical style layer keyed by A1 range. Themed entirely through CSS variables.
