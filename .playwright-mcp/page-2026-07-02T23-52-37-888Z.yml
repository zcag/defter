      - generic [ref=f5e472]:
        - generic [ref=f5e473]: 🎨
        - heading "Rich, but still text" [level=3] [ref=f5e474]
        - paragraph [ref=f5e475]: Fills, formats, merges, borders, alignment — a co-canonical style layer keyed by A1 range. Themed entirely through CSS variables.
