      - generic [ref=f5e464]:
        - generic [ref=f5e465]: 👥
        - heading "Collaboration for free" [level=3] [ref=f5e466]
        - paragraph [ref=f5e467]: Bind the canonical text to a text CRDT (Yjs Y.Text). Bring your own provider; Defter never owns the socket.
      - generic [ref=f5e468]:
        - generic [ref=f5e469]: 🤖
        - heading "Agents read & write it" [level=3] [ref=f5e470]
