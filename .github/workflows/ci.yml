name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # esbuild's binary ships via its platform optional-dep, so skipping lifecycle
      # scripts is safe and avoids pnpm's build-approval gate failing in fresh CI.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build packages
        run: pnpm -r --filter "./packages/*" build
      - name: Test
        run: pnpm test
      - name: Build demo
        run: pnpm --filter @defter/demo build
